name: Liveblog CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
      SYNDICATION_VALIDATE_AUTH: 0
      MAIL_SERVER: 'localhost'
      MAIL_PORT: 2225
      MAIL_USERNAME: __EMPTY__
      MAIL_PASSWORD: __EMPTY__
      MAIL_USE_TLS: 0
      MAIL_USE_SSL: 0
      MAIL_DEBUG: 1
      MAIL_SUPPRESS_SEND: true
      IFRAMELY_KEY: ${{ secrets.IFRAMELY_KEY }}
      SUPERDESK_URL: 'http://localhost:5000/api'
      SUPERDESK_WS_URL: 'ws://localhost:5100'
      SUPERDESK_CLIENT_URL: 'http://localhost:9000'
      WEB_CONCURRENCY: 3
      WEB_TIMEOUT: 8
      SUPERDESK_TESTING: true
      MARKETPLACE: true
      SYNDICATION: true

    services:
      mongodb:
        image: mongo:3.4.23
        ports:
          - 27017:27017
      redis:
        image: redis
        ports:
          - 6379:6379
      elasticsearch:
        image: liveblog3/elasticsearch:1.7.2
        ports:
          - 9200:9200

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        cache: 'pip'
        cache-dependency-path: 'server/dev-requirements.txt'

    - name: Install Python dependencies and run tests
      working-directory: ./server
      run: |
        pip install -r dev-requirements.txt
        pytest --ignore=src/ --disable-pytest-warnings -v
        behave --format progress2 --logging-level ERROR

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: 'client/package.json'
        cache: 'npm'
        cache-dependency-path: 'client/package-lock.json'

    - name: Install Nodejs dependencies and lint
      working-directory: ./client
      shell: bash
      run: |
        git config --global url."https://github.com/".insteadOf ssh://git@github.com/
        git config --global --add url."https://github.com/".insteadOf git+ssh://git@github.com/
        node --version
        npm --version
        npm config set loglevel warn
        npm ci --ignore-scripts
        npm run lint

    - name: Initialize app data
      working-directory: ./server
      run: |
        python app_init_elastic.py
        python manage.py app:initialize_data
        python manage.py users:create -u admin -p admin -fn Admin -ln Admin -e 'admin@example.com' --admin
        python manage.py register_local_themes
        python manage.py register_bloglist

    - name: Start backend services
      working-directory: ./server
      run: |
        (nohup honcho start &)
        (nohup sudo python -m smtpd -n -c DebuggingServer localhost:2225 &)

    - name: Build client
      working-directory: ./client
      shell: bash
      run: |
        npm run build
        cd dist
        (nohup python -m http.server 9000 &)

    - name: Setup Node 24 for Playwright
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install Playwright dependencies
      working-directory: ./client/e2e
      shell: bash
      run: |
        npm ci
        npx playwright install chromium --with-deps

    - name: Run Playwright e2e tests
      working-directory: ./client/e2e
      shell: bash
      run: npx playwright test --reporter=line
